name: Xây dựng & Cập Nhật PicklePro VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Triển Khai Code Tới VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 15m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 1. Vào thư mục dự án
            cd ~/PicklePro || exit 1
            
            # 2. Lấy code mới nhất
            git fetch --all
            git reset --hard origin/main
            
            # 3. Xoá rác ngoài dự án (tránh lỗi lockfile trùng)
            rm -rf /root/package-lock.json /root/node_modules /root/package.json /root/.next /root/pages
            
            # 4. Xoá cache build cũ (tránh lỗi JSON parse)
            rm -rf .next tsconfig.tsbuildinfo
            
            # 5. Cài đặt gói
            npm install --legacy-peer-deps
            
            # 6. Prisma
            npx prisma generate
            npx prisma db push
            
            # 7. Build (unset NODE_ENV để Next.js tự xử lý - tránh xung đột từ .env)
            unset NODE_ENV
            NODE_OPTIONS="--max-old-space-size=2048" npm run build
            
            # 8. Khởi động PM2
            pm2 restart picklepro --update-env || pm2 start npm --name "picklepro" -- run start
            pm2 save

  notify:
    name: Thông báo trạng thái (Email)
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Deployment Status Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[PicklePro] Deploy ${{ needs.deploy.result == ''success'' && ''THÀNH CÔNG 🎉'' || ''THẤT BẠI ❌'' }}'
          to: ${{ secrets.TO_EMAIL }}
          from: PicklePro CI/CD Bot
          body: |
            Xin chào!
            
            Trạng thái: ${{ needs.deploy.result }}
            Nhánh: ${{ github.ref_name }}
            Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
