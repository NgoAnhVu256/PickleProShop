name: Xây dựng & Cập Nhật PicklePro VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép ấn nút chạy tay trên giao diện Action

jobs:
  deploy:
    name: Triển Khai Code Tới VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          # Kịch bản thực thi trên máy chủ (VPS)
          script: |
            # 1. Vào đúng thư mục dự án
            cd ~/PicklePro || exit 1
            
            # 2. Lấy code mới nhất
            git fetch --all
            git reset --hard origin/main
            
            # 3. Build lại Docker image và khởi động
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            
            # 4. Chờ DB sẵn sàng rồi đồng bộ Prisma schema
            sleep 10
            docker exec picklepro-web npx prisma db push --accept-data-loss || true
            
            # 5. Dọn dẹp image cũ
            docker image prune -f

  notify:
    name: Thông báo trạng thái (Email)
    needs: deploy
    runs-on: ubuntu-latest
    if: always() # Luôn luôn chạy dù cho bước Deploy trên kia thành công hay nổ lỗi
    steps:
      - name: Send Deployment Status Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          # Phân tách tuỳ đề: Thất Bại hay Thành công
          subject: '[PicklePro] Triển khai hệ thống ${{ needs.deploy.result == ''success'' && ''THÀNH CÔNG 🎉'' || ''THẤT BẠI ❌'' }}'
          to: ${{ secrets.TO_EMAIL }}
          from: PicklePro CI/CD Bot
          # Nội dung thông điệp
          body: |
            Xin chào!

            Tiến trình tự động hoá CI/CD cập nhật cho cửa hàng PicklePro vừa hoàn tất xử lý.
            Trạng thái hiện tại: ${{ needs.deploy.result }}
            
            Thông tin mã nguồn:
            - Nhánh đẩy (Branch): ${{ github.ref_name }}
            - Tài khoản (Actor): ${{ github.actor }}
            - Xem lịch sử log cập nhật tại: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Hãy truy cập VPS để kiểm tra nếu trạng thái trả về là Thất Bại (failure).
            Trân trọng!
