services:
  redis:
    image: redis:7-alpine
    container_name: picklepro-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379" # Chỉ mở cổng 6379 nội bộ cho PM2 kết nối
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    container_name: picklepro-worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    command: node chatWorker.mjs
    env_file:
      - .env
    environment:
      # Worker kết nối qua network docker nên dùng 'redis'
      REDIS_URL: redis://redis:6379

volumes:
  redis_data: