services:
  db:
    image: postgres:16-alpine
    container_name: picklepro-db
    restart: always
    environment:
      POSTGRES_USER: pickleuser
      POSTGRES_PASSWORD: picklepassword
      POSTGRES_DB: picklepro
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: picklepro-web
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pickleuser:picklepassword@db:5432/picklepro?schema=public

volumes:
  postgres_data: